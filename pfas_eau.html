<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>PFAS - Qualité de l'eau</title>
  <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
  <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet">
  <script src="https://unpkg.com/pmtiles@3.0.6/dist/pmtiles.js"></script>
  <script src="https://unpkg.com/@maplibre/maplibre-gl-geocoder@1.5.0/dist/maplibre-gl-geocoder.min.js"></script>
  <link href="https://unpkg.com/@maplibre/maplibre-gl-geocoder@1.5.0/dist/maplibre-gl-geocoder.css" rel="stylesheet">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Vend Sans', sans-serif; }

    body { width: 100%; height: 100vh; }

    #map-container {
      position: relative;
      width: 100%;
      height: 100%;
    }

    #map { width: 100%; height: 100%; }

    #legend {
      position: absolute;
      bottom: 20px;
      left: 10px;
      background: white;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 11px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.2);
      max-width: 260px;
    }
    #legend b { font-size: 11px; }
    .legend-item { display: flex; align-items: center; gap: 6px; margin: 3px 0; }
    .legend-box { width: 12px; height: 12px; border: 1px solid #ccc; flex-shrink: 0; }

    #buttons {
      position: absolute;
      top: 10px;
      right: 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    #buttons button {
      background: white;
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 12px;
      cursor: pointer;
    }
    #buttons button:hover { background: #f0f0f0; }

    #fullscreen-btn {
      position: absolute;
      bottom: 20px;
      right: 10px;
      background: white;
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 12px;
      cursor: pointer;
      box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }
    #fullscreen-btn:hover { background: #f0f0f0; }

    .maplibregl-ctrl-geocoder { width: 260px; max-width: 260px; }
    .maplibregl-ctrl-geocoder--icon-search { display: none; }
    .maplibregl-marker { display: none !important; }
    .maplibregl-ctrl-geocoder input,
    .maplibregl-ctrl-geocoder .suggestions,
    .maplibregl-ctrl-geocoder .suggestions li {
      font-family: 'Vend Sans', sans-serif !important;
      font-size: 12px;
    }
  </style>
</head>
<body>

<div id="map-container">

  <div id="map"></div>

  <div id="legend">
    <b>Concentration en PFAS (seuil 0,1 µg/L)</b>
    <div class="legend-item"><div class="legend-box" style="background:grey"></div> Pas de données</div>
    <div class="legend-item"><div class="legend-box" style="background:#40c58d"></div> Conforme à la limite de qualité (&lt; 0,1 µg/l)*</div>
    <div class="legend-item"><div class="legend-box" style="background:#F5BA47"></div> Dépasse la limite du HCSP (> 0,02 µg/l)**</div>
    <div class="legend-item"><div class="legend-box" style="background:#E7292D"></div> Dépasse la limite de qualité (> 0,1 µg/l)</div>
    <hr style="border: none; border-top: 1px solid #eee; margin: 6px 0;">
    <div style="font-size: 10px;">
      <div>Source : Ministère des Solidarités et de la Santé</div>
      <div>© Lisa Boudoussier</div>
    </div>
    <div style="display: flex; justify-content: flex-end; margin-top: 4px;">
      <img src="https://lisaboudoussier-8.github.io/pfas-tiles/vert-PNG.png" alt="Vert" height="24">
    </div>
  </div>

  <div id="buttons">
    <button onclick="flyTo([2.5, 46.5], 5)">France métropolitaine</button>
    <button onclick="flyTo([-61.5, 16.2], 9)">Guadeloupe</button>
    <button onclick="flyTo([-61.0, 14.6], 9)">Martinique</button>
    <button onclick="flyTo([-53.0, 4.0], 6)">Guyane</button>
    <button onclick="flyTo([55.5, -21.1], 9)">La Réunion</button>
    <button onclick="flyTo([45.2, -12.8], 10)">Mayotte</button>
  </div>

  <button id="fullscreen-btn" onclick="toggleFullscreen()">⛶ Plein écran</button>

</div>

<script>
  const protocol = new pmtiles.Protocol();
  maplibregl.addProtocol("pmtiles", protocol.tile);

  const map = new maplibregl.Map({
    container: 'map',
    style: 'https://api.maptiler.com/maps/dataviz/style.json?key=93VLEQWRu6foI9TAdB92',
    center: [2.5, 46.5],
    zoom: 5
  });

  // ── POPUP UNIQUE ──
  let currentPopup = null;
  function openPopup(lngLat, html) {
    if (currentPopup) currentPopup.remove();
    currentPopup = new maplibregl.Popup()
      .setLngLat(lngLat)
      .setHTML(html)
      .addTo(map);
  }

  // ── BARRE DE RECHERCHE ──
  const geocoder = new MaplibreGeocoder(
    {
      forwardGeocode: async (config) => {
        try {
          const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(config.query)}&format=geojson&countrycodes=fr&limit=10`;
          const res = await fetch(url, { headers: { 'Accept-Language': 'fr' } });
          const data = await res.json();

          // Filtre les types pertinents et dédoublonne par nom de commune
          const seen = new Set();
const filtered = data.features.filter(f => {
  const type = f.properties.type;
  const parts = f.properties.display_name.split(',');
  const nom = parts[0].trim();
  const dept = parts[1] ? parts[1].trim() : '';
  const cle = `${nom}|${dept}`; // clé unique = nom + département
  const isRelevant = ['city', 'town', 'village', 'municipality', 'administrative'].includes(type);
  if (!isRelevant || seen.has(cle)) return false;
  seen.add(cle);
  return true;
});

          return {
            features: filtered.map(f => ({
              type: 'Feature',
              geometry: f.geometry,
              // Affiche "Commune, Département" seulement
              place_name: f.properties.display_name
                .split(',')
                .slice(0, 2)
                .join(',')
                .trim(),
              center: f.geometry.type === 'Point'
                ? f.geometry.coordinates
                : [f.bbox[0] + (f.bbox[2] - f.bbox[0]) / 2, f.bbox[1] + (f.bbox[3] - f.bbox[1]) / 2],
              properties: f.properties
            }))
          };
        } catch(e) {
          return { features: [] };
        }
      }
    },
    {
      maplibregl,
      placeholder: '🔍  Rechercher une commune',
      collapsed: false,
      flyTo: false
    }
  );

  map.addControl(geocoder, 'top-left');

  geocoder.on('result', function(e) {
    const center = e.result.center;
    map.flyTo({ center, zoom: 11 });
    map.once('moveend', function() {
      setTimeout(() => {
        const point = map.project(center);
        const features = map.queryRenderedFeatures(point, { layers: ['pfas-fill'] });
        if (features.length > 0) {
          const props = features[0].properties;
          openPopup(center, props.popup);
        }
      }, 500);
    });
  });

  map.on('load', function() {
    map.addSource('UDI_pfas_j', {
      type: 'vector',
      url: 'pmtiles://https://lisaboudoussier-8.github.io/pfas-tiles/pfas.pmtiles'
    });

    map.addLayer({
      id: 'pfas-fill',
      type: 'fill',
      source: 'UDI_pfas_j',
      'source-layer': 'UDI_pfas_j',
      minzoom: 4,
      paint: {
        'fill-color': ['get', 'couleur'],
        'fill-opacity': 0.7
      }
    });

    map.on('click', 'pfas-fill', function(e) {
      const props = e.features[0].properties;
      openPopup(e.lngLat, props.popup);
    });

    map.on('mouseenter', 'pfas-fill', () => map.getCanvas().style.cursor = 'pointer');
    map.on('mouseleave', 'pfas-fill', () => map.getCanvas().style.cursor = '');
  });

  function flyTo(center, zoom) {
    map.flyTo({ center, zoom });
  }

  // ── PLEIN ÉCRAN ──
  function toggleFullscreen() {
    const container = document.getElementById('map-container');
    const btn = document.getElementById('fullscreen-btn');
    if (!document.fullscreenElement) {
      container.requestFullscreen();
      btn.textContent = '✕ Quitter le plein écran';
    } else {
      document.exitFullscreen();
      btn.textContent = '⛶ Plein écran';
    }
  }

  document.addEventListener('fullscreenchange', function() {
    map.resize();
  });
</script>
</body>
</html>
