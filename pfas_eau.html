<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>PFAS - Qualité de l'eau</title>
  <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
  <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet">
  <!-- PMTiles -->
  <script src="https://unpkg.com/pmtiles@3.0.6/dist/pmtiles.js"></script>

  <style>
    body { margin: 0; }
    #map { width: 100vw; height: 100vh; }
    /* ... ton CSS existant ... */
  </style>
</head>
<body>
<div id="map"></div>

<script>
  // Active le protocol PMTiles
  const protocol = new pmtiles.Protocol();
  maplibregl.addProtocol("pmtiles", protocol.tile);

  const map = new maplibregl.Map({
    container: 'map',
    style: 'https://basemaps.cartocdn.com/gl/positron-gl-style/style.json', // fond de carte gratuit
    center: [2.5, 46.5],
    zoom: 5
  });

  map.on('load', function() {
    map.addSource('UDI_pfas_j', {
      type: 'vector',
      url: 'pmtiles://https:///Users/lisaboudoussier/Documents/Enquête PFAS - Vert/pfas.pmtiles'
    });

    map.addLayer({
      id: 'pfas-fill',
      type: 'fill',
      source: 'UDI_pfas_j',
      'source-layer': 'UDI_pfas_j', // nom de la couche dans le PMTiles
      minzoom: 4,
      paint: {
        'fill-color': ['get', 'couleur'],
        'fill-opacity': 0.7
      }
    });

    map.on('click', 'pfas-fill', function(e) {
      const props = e.features[0].properties;
      new maplibregl.Popup()
        .setLngLat(e.lngLat)
        .setHTML(props.popup)
        .addTo(map);
    });

    map.on('mouseenter', 'pfas-fill', () => map.getCanvas().style.cursor = 'pointer');
    map.on('mouseleave', 'pfas-fill', () => map.getCanvas().style.cursor = '');
  });

  function flyTo(center, zoom) {
    map.flyTo({ center, zoom });
  }
</script>
</body>
</html>
